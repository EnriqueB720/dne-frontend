query booking($where: BookingWhereInput!) {
  booking(where: $where) {
    bookingId
    requestId
    quoteId
    customerId
    supplierId
    serviceDate
    serviceEndDate
    location
    guestCount
    totalPrice
    platformFee
    supplierPayout
    currency
    status
    paymentStatus
    phoneRevealedAt
    cancellationReason
    cancelledAt
    cancelledBy
    completedAt
    createdAt
    updatedAt
    request {
      requestId
      rawQuery
      serviceDate
      guestCount
      city
    }
    quote {
      quoteId
      totalPrice
      currency
      validUntil
      message
    }
    customer {
      customerId
      user {
        userId
        name
        email
      }
    }
    supplier {
      supplierId
      companyName
      city
      businessPhone
      whatsappNumber
    }
  }
}
