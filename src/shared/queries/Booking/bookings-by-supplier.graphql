query bookingsBySupplier($supplierId: Int!, $status: BookingStatus) {
  bookingsBySupplier(supplierId: $supplierId, status: $status) {
    bookingId
    requestId
    quoteId
    customerId
    serviceDate
    location
    guestCount
    totalPrice
    supplierPayout
    currency
    status
    paymentStatus
    createdAt
    customer {
      customerId
      user {
        userId
        name
      }
    }
    request {
      requestId
      rawQuery
    }
  }
}
