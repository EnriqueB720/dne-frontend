query quotesBySupplier($supplierId: Int!, $status: QuoteStatus) {
  quotesBySupplier(supplierId: $supplierId, status: $status) {
    quoteId
    requestId
    totalPrice
    currency
    message
    validUntil
    status
    createdAt
    request {
      requestId
      rawQuery
      city
      customer {
        customerId
        user {
          userId
          name
        }
      }
    }
  }
}
