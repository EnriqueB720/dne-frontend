query quotesByRequest($requestId: Int!, $status: QuoteStatus) {
  quotesByRequest(requestId: $requestId, status: $status) {
    quoteId
    supplierId
    totalPrice
    currency
    message
    validUntil
    status
    createdAt
    offeredSlots {
      startsAt
      endsAt
    }
    supplier {
      supplierId
      companyName
      city
      rating
      reviewCount
    }
  }
}
