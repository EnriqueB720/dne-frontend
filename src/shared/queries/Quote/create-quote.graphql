mutation createQuote($data: QuoteCreateInput!) {
  createQuote(data: $data) {
    quoteId
    requestId
    supplierId
    totalPrice
    currency
    message
    validUntil
    status
    createdAt
    items {
      quoteItemId
      description
      quantity
      unitPrice
      total
    }
    offeredSlots {
      startsAt
      endsAt
    }
  }
}
