query login($data: LoginUserInput!) {
  login(data: $data) {
    access_token
    expiresAt
    user {
      userId
      email
      language
      country
      name
      phone
      role
      profilePicture
      isCustomer
      isSupplier
      isAdmin
      subscription {
        subscriptionId
        plan {
          planId
          planName
          price
        }
        status
        startDate
        endDate
      }
      supplier {
        supplierId
        companyName
      }
      customer {
        customerId
        defaultCity
      }
    }
  }
}
