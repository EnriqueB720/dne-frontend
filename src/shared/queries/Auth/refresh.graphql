query RefreshUser($token: String!) {
  refreshUser(token: $token) {
    access_token
    expiresAt
    user {
      userId
      email
      name
      phone
      language
      country
      role
      profilePicture
      createdAt
      subscription {
        subscriptionId
        userId
        planId
        plan {
          planId
          planName
          price
          features
        }
        status
        startDate
        endDate
      }
    }
  }
}
