query refreshUser($data: String!) {
  refreshUser(data: $data) {
    access_token
    expiresAt
   user {
      userId
      email
      language
      country
      name
      phone
      role
      profilePicture
      subscription {
        subscriptionId
        plan {
          planId
          planName
          price
        }
        status
        startDate
        endDate
      }
      supplier {
        supplierId
        companyName
        posts {
          postId
          title
          description
          price
          media_url
          createdAt
          category{
            categoryId
            categoryName
          }
        }
      }
    }
  }
}
